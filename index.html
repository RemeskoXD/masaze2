<!DOCTYPE html>
<html lang="cs" class="scroll-smooth">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tereza Rozkošná | Celostní Masáže & Regenerace</title>
    <meta name="description" content="Masáže, regenerace, doplňky MediHub a celostní zdraví v Načeradci." />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'deep-green': '#0a2f1c', // Tmavě zelený podklad
              'gold': '#d4af37', // Zlatá
              'gold-light': '#f3e5ab',
              'gold-dark': '#aa8c2c',
              'soft-white': '#f9f9f9',
            },
            fontFamily: {
              serif: ['"Playfair Display"', 'serif'],
              sans: ['"Lato"', 'sans-serif'],
            },
            animation: {
              'slow-zoom': 'zoom 20s infinite alternate',
              'fade-in-up': 'fadeInUp 1s ease-out forwards',
            },
            keyframes: {
              zoom: {
                '0%': { transform: 'scale(1)' },
                '100%': { transform: 'scale(1.1)' },
              },
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #0a2f1c;
        color: #f9f9f9;
      }
      /* Text gradient helper */
      .text-gradient-gold {
        background: linear-gradient(to right, #f3e5ab, #d4af37, #f3e5ab);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-size: 200% auto;
        animation: shine 5s linear infinite;
      }
      
      @keyframes shine {
        to {
          background-position: 200% center;
        }
      }

      /* Custom scrollbar for webkit */
      ::-webkit-scrollbar {
        width: 10px;
      }
      ::-webkit-scrollbar-track {
        background: #061f12;
      }
      ::-webkit-scrollbar-thumb {
        background: linear-gradient(180deg, #0a2f1c, #d4af37, #0a2f1c);
        border-radius: 5px;
        border: 2px solid #061f12;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.564.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
  </body>
</html>
