<!DOCTYPE html>
<html lang="cs" class="scroll-smooth">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tereza Rozkošná | Celostní Masáže & Regenerace</title>
    <meta name="description" content="Masáže, regenerace, doplňky MediHub a celostní zdraví v Načeradci." />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'beige-bg': '#FDFBF7',
              'beige-dark': '#F5F2ED',
              'gold': '#C5A880',
              'gold-light': '#E6D5C3',
              'gold-dark': '#8C7355',
              'text-dark': '#1A1A1A',
              'text-muted': '#666666',
              'deep-green': '#1A2F24',
              'soft-white': '#FAFAFA',
            },
            fontFamily: {
              serif: ['"Cormorant Garamond"', 'serif'],
              sans: ['"Montserrat"', 'sans-serif'],
            },
            animation: {
              'slow-zoom': 'zoom 20s infinite alternate',
              'fade-in-up': 'fadeInUp 1s ease-out forwards',
            },
            keyframes: {
              zoom: {
                '0%': { transform: 'scale(1)' },
                '100%': { transform: 'scale(1.1)' },
              },
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #FDFBF7;
        color: #2C2C2C;
      }
      /* Text gradient helper */
      .text-gradient-gold {
        background: linear-gradient(to right, #f3e5ab, #d4af37, #f3e5ab);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-size: 200% auto;
        animation: shine 5s linear infinite;
      }
      
      @keyframes shine {
        to {
          background-position: 200% center;
        }
      }

      /* Custom scrollbar for webkit */
      ::-webkit-scrollbar {
        width: 10px;
      }
      ::-webkit-scrollbar-track {
        background: #F4EFE6;
      }
      ::-webkit-scrollbar-thumb {
        background: linear-gradient(180deg, #d4af37, #aa8c2c);
        border-radius: 5px;
        border: 2px solid #F4EFE6;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.564.0",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.4",
    "vite": "https://esm.sh/vite@^7.3.1"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

    <div id="root"></div>

  </body>
</html>
